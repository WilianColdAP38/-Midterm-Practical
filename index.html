<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deportes Live</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
</head>
<body>
    <header class="navbar">
        <div class="nav-left">
            <span class="material-symbols-outlined icon-btn">menu</span>
            <a href="index.html" class="logo">
                <span class="material-symbols-outlined logo-icon">sports_soccer</span>
                <span class="logo-text">Deportes<span class="logo-text-acento">Live</span></span>
            </a>
        </div>
        <div class="nav-center">
            <div class="search-bar">
                <input type="text" placeholder="Buscar">
                <button type="button"><span class="material-symbols-outlined">search</span></button>
            </div>
            <span class="material-symbols-outlined mic-icon">mic</span>
        </div>
        <div class="nav-right">
            <span class="material-symbols-outlined icon-btn">video_call</span>
            <span class="material-symbols-outlined icon-btn">notifications</span>
            <img src="https://ui-avatars.com/api/?name=Elian&background=e50914&color=fff" class="user-avatar" alt="Avatar">
        </div>
    </header>

    <div class="main-layout">
        <aside class="sidebar">
            <div class="side-item active">
                <span class="material-symbols-outlined">home</span>
                <span class="side-text">Principal</span>
            </div>
            <div class="side-item">
                <span class="material-symbols-outlined">bolt</span>
                <span class="side-text">Trending</span>
            </div>
            <div class="side-item">
                <span class="material-symbols-outlined">subscriptions</span>
                <span class="side-text">Suscripciones</span>
            </div>
            <hr>
            <div class="side-item">
                <span class="material-symbols-outlined">sports_soccer</span>
                <span class="side-text">Fútbol</span>
            </div>
            <div class="side-item">
                <span class="material-symbols-outlined">sports_basketball</span>
                <span class="side-text">NBA</span>
            </div>
            <div class="side-item">
                <span class="material-symbols-outlined">directions_car</span>
                <span class="side-text">F1</span>
            </div>
        </aside>

        <main class="content">
            <nav class="chips-bar" id="chipsBar"></nav>
            <div class="video-grid" id="videoGrid">
                <p class="cargando">Cargando videos...</p>
            </div>
        </main>
    </div>

    <script src="js/index.js"></script>
</body>
</html>
