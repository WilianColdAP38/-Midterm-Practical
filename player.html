<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor | Deportes Live</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
</head>
<body>
    <header class="navbar">
        <div class="nav-left">
            <span class="material-symbols-outlined icon-btn">menu</span>
            <a href="index.html" class="logo">
                <span class="material-symbols-outlined logo-icon">sports_soccer</span>
                <span class="logo-text">Deportes<span class="logo-text-acento">Live</span></span>
            </a>
        </div>
        <div class="nav-center">
            <div class="search-bar">
                <input type="text" placeholder="Buscar">
                <button type="button"><span class="material-symbols-outlined">search</span></button>
            </div>
        </div>
        <div class="nav-right">
            <img src="https://ui-avatars.com/api/?name=Elian&background=e50914&color=fff" class="user-avatar" alt="Avatar">
        </div>
    </header>

    <main class="player-layout">
        <section class="player-main" id="playerMain">
            <p class="cargando">Cargando video...</p>
        </section>

        <aside class="recommendations" id="recommendations">
            <h2 class="aside-title">Recomendados</h2>
            <div class="rec-list" id="recList">
                <p class="cargando">Cargando recomendaciones...</p>
            </div>
        </aside>
    </main>

    <script src="js/player.js"></script>
</body>
</html>
